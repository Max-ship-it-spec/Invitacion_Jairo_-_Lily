<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invitación de Boda - Leonardo & Anastasia</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background-color: #ede8df;
  background-image: url(Imagenes/Fondo6.png);

  background-size: cover;        
  background-position: center;  
  background-repeat: no-repeat;  
  background-attachment: fixed;  
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
}

.scene {
  position: relative;
  width: 420px;

}

@media (max-width: 460px) {
  .scene {
    width: 92vw;
  }

  .letter-card {
    padding: 22px 16px 36px;
  }

  .letter-card p {
    font-size: 18px;
  }

  .label {
    font-size: 14px;
  }
}

@keyframes sceneIn {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.envelope-open {
  display: block;
  width: 100%;
  position: relative;
  z-index: 1;
}

.letter-wrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 2;
  animation: letterRise 1.6s cubic-bezier(0.20, 1, 0.36, 1) 0.7s both;
}

@keyframes letterRise {
  0%   { bottom: 24%; opacity: 0; }
  15%  { opacity: 1; }
  100% { bottom: 44%; opacity: 1; }
}

.letter-card {
  background: #faf8f2;
  border-radius: 3px;
  padding: 28px 22px 45px;
  text-align: center;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.13), 0 4px 12px rgba(0,0,0,0.08);
  border: 1.5px solid #c9a84c;
  outline: 1px solid #e8c96a;
  outline-offset: -6px;
  position: relative;
}

.letter-card::before,
.letter-card::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-color: #c9a84c;
  border-style: solid;
}

.letter-card::before {
  top: 5px; left: 5px;
  border-width: 1.5px 0 0 1.5px;
}

.letter-card::after {
  bottom: 5px; right: 5px;
  border-width: 0 1.5px 1.5px 0;
}

.letter-wrap::before,
.letter-wrap::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-color: #c9a84c;
  border-style: solid;
  z-index: 1;
}

.letter-wrap::before {
  top: 5px; right: 5px;
  border-width: 1.5px 1.5px 0 0;
}

.letter-wrap::after {
  bottom: 5px; left: 5px;
  border-width: 0 0 1.5px 1.5px;
}

.label {
  font-size: 17px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  background: linear-gradient(135deg, #b8860b 0%, #e8c84a 40%, #c9a020 60%, #f0d060 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 14px;
  font-weight: 400;
}

.divider {
  width: 56px; 
  height: 1px;
  background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  margin: 0 auto 18px;
}

.letter-card p {
  color: #6b2233;
  font-size: 21px;
  font-weight: 300;
  line-height: 1.8;
  letter-spacing: 0.03em;
  margin-bottom: 24px;
}

.letter-card p em {
  font-style: italic;
  font-size: 1.25em;
  display: block;
  margin-top: 4px;
  color: #5a1520;
  font-weight: 400;
}

.btn-open {
  display: inline-block;
  background: #7a1625;
  color: #f5e6cc;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 11px 30px;
  border-radius: 30px;
  text-decoration: none;
  transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
  box-shadow: 0 4px 16px rgba(122,22,37,0.35);
}

.btn-open:hover {
  background: #5c0f1a;
  transform: translateY(-2px);
  box-shadow: 0 7px 22px rgba(122,22,37,0.45);
}

.envelope-closed {
  position: absolute;
  bottom: 0; 
  left: 0;
  width: 100%;
  z-index: 10;
    pointer-events: none; /* 👈 AGREGA ESTO */
}

@media (max-width: 460px) {
  .scene {
    width: 420px;
    transform-origin: center center;
    transform: scale(calc((100vw - 32px) / 420px));
  }
}
</style>
</head>

<body>

<div class="scene">
  <img class="envelope-open" src="Imagenes/Carta2.png" alt="Sobre abierto" />

  <div class="letter-wrap">
    <div class="letter-card">
      <p class="label">Invitación de Boda</p>
      <div class="divider"></div>
      <p>Estás invitado/a a la boda de<em>Jairo &amp; LiLy</em></p>
      <a href="Carta.html" class="btn-open">Abrir invitación</a>
    </div>
  </div>

  <img class="envelope-closed" src="Imagenes/Carta1.png" alt="Sobre cerrado" />
</div>

</body>
</html>
